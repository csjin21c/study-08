# 워크플로우의 이름입니다. GitHub Actions 탭에서 이 이름으로 표시됩니다.
name: Nginx-Deployment-Pipeline

# 트리거 설정: 어떤 이벤트가 발생했을 때 이 파이프라인을 실행할지 결정합니다.
on:
  push:
  #   branches: ["main"] # main 브랜치에 코드가 push될 때 실행
  # pull_request:
  #   branches: ["main"] # main 브랜치로 PR이 생성될 때 실행

# 권한 설정: GitHub Actions 러너가 리포지토리의 코드를 읽을 수 있도록 허용합니다.
# permissions:
#   contents: read

jobs:
  # 작업의 이름입니다.
  build-and-deploy:
    runs-on: ubuntu-latest # 이 작업이 실행될 환경을 지정합니다. (ubuntu-latest, windows-latest, macos-latest)

    steps:
      # 1단계: 리포지토리에 올린 코드를 가상 머신으로 가져옵니다.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2단계: AWS 명령을 실행하기 위해 자격 증명을 설정합니다.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # IAM 사용자 액세스 키
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # IAM 사용자 비밀 키
          aws-region: ${{ secrets.AWS_REGION }} # 대상 AWS 리전 (예: ap-northeast-2)

      # 3단계: 자주 바뀌는 설정 파일과 HTML 정적 자산을 S3 버킷에 업로드합니다.
      - name: Upload Config and Assets to S3
        run: |
          # default.conf 파일을 S3의 config 폴더로 복사합니다.
          aws s3 cp ./default.conf s3://${{ secrets.S3_BUCKET_NAME }}/config/default.conf
          # html 폴더 전체를 S3의 html 폴더와 동기화합니다. (--delete는 로컬에 없는 파일은 S3에서도 삭제)
          aws s3 sync ./html/ s3://${{ secrets.S3_BUCKET_NAME }}/html/ --delete

      # 4단계: Docker 이미지를 저장할 ECR 리포지토리에 로그인합니다.
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5단계: Docker 이미지를 빌드하고 ECR에 업로드(Push)합니다.
      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }} # 로그인 단계에서 얻은 레지스트리 주소
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }} # ECR 리포지토리 이름
          IMAGE_TAG: ${{ github.sha }} # 현재 커밋의 고유 ID(해시값)를 태그로 사용
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 6단계: AWS SSM을 통해 EC2 인스턴스에 접속하여 실제 배포 명령을 내립니다.
      - name: Deploy to EC2 via SSM
        run: |
          # 1. 쉘 스크립트에서 사용할 변수를 정리합니다.
          # REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          # REPO="${{ secrets.ECR_REPOSITORY }}"
          # TAG="${{ github.sha }}"
          # IMAGE_URL="$REGISTRY/$REPO:$TAG"

          # 2. SSM Send-Command를 통해 EC2 내부에서 실행될 명령어를 전달합니다.
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:${{ secrets.ASG_TAG_KEY }},Values=${{ secrets.ASG_TAG_VALUE }}" \
            --region ${{ secrets.AWS_REGION }} \
            --parameters "{
              \"commands\": [
                \"sudo mkdir -p /home/ec2-user/nginx/html\",
                \"sudo mkdir -p /home/ec2-user/nginx/conf.d\",
                \"sudo chown -R ec2-user:ec2-user /home/ec2-user/nginx\",
                
                \"aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/config/default.conf /home/ec2-user/nginx/conf.d/default.conf\",
                \"aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/html/ /home/ec2-user/nginx/html/ --delete\",
                
                \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}\",
                
                # 핵심: ${{ }} 가 직접 들어있어야 전송 전에 '진짜 주소'로 바뀝니다.
                \"sudo docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}\",
                
                \"sudo docker stop nginx-server || true\",
                \"sudo docker rm nginx-server || true\",
                
                \"sudo docker run -d --name nginx-server -p 80:80 \
                  -v /home/ec2-user/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf \
                  -v /home/ec2-user/nginx/html:/usr/share/nginx/html \
                  ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}\",
                
                \"sudo docker image prune -f\"
              ]
            }"
